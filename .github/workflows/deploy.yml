name: Deploy to geldhelden.org

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "=== Geldhelden AMI Deploy ==="
            cd ~/www/geldhelden.org/wp-content/plugins/geldhelden-ami
            git fetch origin main
            git reset --hard origin/main
            echo "=== Deploy erfolgreich ==="
            date

      - name: Notify via Telegram
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ AMI v$(cat geldhelden-ami.php | grep 'Version:' | awk '{print $3}') deployed auf geldhelden.org"

      - name: Notify Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ AMI Deploy fehlgeschlagen! Commit: ${{ github.sha }}"
